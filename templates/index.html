<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🌐 Language Translation Tool</h1>
        
        <div class="translation-box">
            <div class="section">
                <label for="source-lang">Source Language:</label>
                <select id="source-lang">
                    <option value="es">Spanish</option>
    <option value="en">English</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="hi">Hindi</option>
    <option value="zh">Chinese</option>
    <option value="ja">Japanese</option>
    <option value="ko">Korean</option>
    <option value="ar">Arabic</option>
    <option value="ru">Russian</option>
    <option value="pt">Portuguese</option>
    <option value="it">Italian</option>
    <option value="nl">Dutch</option>
    <option value="tr">Turkish</option>
    <option value="pl">Polish</option>
    <option value="sv">Swedish</option>
    <option value="ta">Tamil</option>
    <option value="te">Telugu</option>
    <option value="ml">Malayalam</option>
    <option value="bn">Bengali</option>
                    
                </select>
                <label for="input-text">Text to Translate:</label>
                <textarea id="input-text" placeholder="Enter text here..."></textarea>
            </div>

            <div class="section">
                <label for="target-lang">Target Language:</label>
                <select id="target-lang">
    <option value="es">Spanish</option>
    <option value="en">English</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="hi">Hindi</option>
    <option value="zh">Chinese</option>
    <option value="ja">Japanese</option>
    <option value="ko">Korean</option>
    <option value="ar">Arabic</option>
    <option value="ru">Russian</option>
    <option value="pt">Portuguese</option>
    <option value="it">Italian</option>
    <option value="nl">Dutch</option>
    <option value="tr">Turkish</option>
    <option value="pl">Polish</option>
    <option value="sv">Swedish</option>
    <option value="ta">Tamil</option>
    <option value="te">Telugu</option>
    <option value="ml">Malayalam</option>
    <option value="bn">Bengali</option>
</select>
                
                <label for="output-text">Translated Text:</label>
                <textarea id="output-text" placeholder="Translation will appear here..." readonly></textarea>
                <button id="copy-btn" class="btn-secondary">📋 Copy Text</button>
            </div>
        </div>

        <button id="translate-btn" class="btn-primary">Translate</button>
        <div id="error-message" class="error" style="display: none;"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
